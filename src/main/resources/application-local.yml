spring:
  config:
    activate:
      on-profile: local

server:
  port: 8443
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: ${SSL_KEYSTORE_PASSWORD:}
    key-store-type: PKCS12
    key-alias: weib
  servlet:
    session:
      cookie:
        secure: true
        http-only: true
        same-site: lax

websocket:
  allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:https://localhost:8443,https://127.0.0.1:8443}
