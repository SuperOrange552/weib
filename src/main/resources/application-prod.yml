spring:
  config:
    activate:
      on-profile: prod

server:
  port: ${SERVER_PORT:8888}
  ssl:
    enabled: false
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        secure: true
        http-only: true
        same-site: lax

websocket:
  allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:https://superorange.top,https://www.superorange.top}
