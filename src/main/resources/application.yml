server:
  port: 8443
  ssl:
    key-store: classpath:keystore.p12
    key-store-password: weib123
    key-store-type: PKCS12
    key-alias: weib
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
    session:
      timeout: 30m
      cookie:
        secure: true
        http-only: true
        same-site: strict

spring:
  application:
    name: weib

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML

  datasource:
    url: jdbc:mysql://localhost:3306/weib?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:weib-prod-jwt-secret-2026-please-change-in-env}

amap:
  key: ${AMAP_KEY:40e3021845971db336775b94da0326da}

storage:
  upload-dir: /opt/weib/uploads
  avatar-dir: /opt/weib/uploads/avatars
  attachment-dir: /opt/weib/uploads/attachments
  chat-dir: /opt/weib/uploads/chat

logging:
  level:
    root: info
    com.weib: debug
