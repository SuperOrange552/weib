server:
  port: 8443
  ssl:
    key-store: classpath:keystore.p12
    key-store-password: ${SSL_KEYSTORE_PASSWORD:}
    key-store-type: PKCS12
    key-alias: weib
  tomcat:
    threads:
      max: 300
      min-spare: 20
    accept-count: 200
    max-connections: 10000
    connection-timeout: 30000
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
    session:
      timeout: 30m
      cookie:
        # 由反向代理/请求协议决定业务 Cookie 的 Secure 属性；当前站点通过 HTTP 提供服务。
        secure: false
        http-only: true
        same-site: lax

spring:
  application:
    name: weib

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  thymeleaf:
    cache: true
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML

  datasource:
    url: jdbc:mysql://localhost:3306/weib?useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 40
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

jwt:
  secret: ${JWT_SECRET:}
  admin-secret: ${JWT_ADMIN_SECRET:weib-admin-jwt-secret-key-2026-min-256bits!!}

amap:
  key: ${AMAP_KEY:}

storage:
  upload-dir: ./weib/uploads
  avatar-dir: ./weib/uploads/avatars
  attachment-dir: ./weib/uploads/attachments
  chat-dir: ./weib/uploads/chat

websocket:
  allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:https://localhost:8443}

id-obfuscator:
  secret: ${ID_OBFUSCATOR_SECRET:}

admin:
  default-password: ${ADMIN_DEFAULT_PASSWORD:Admin@123456}

# ============================================
# Redis 缓存配置
# ============================================
spring.cache:
  type: redis
  redis:
    time-to-live: 600000
    cache-null-values: false

spring.data.redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  database: 0
  timeout: 3000ms
  lettuce:
    pool:
      max-active: 16
      max-idle: 8
      min-idle: 2
      max-wait: 3000ms

weib.cache:
  enabled: ${WEIB_CACHE_ENABLED:true}
  lock-wait-ms: ${WEIB_CACHE_LOCK_WAIT_MS:150}
  lock-poll-ms: ${WEIB_CACHE_LOCK_POLL_MS:10}
  ttl-jitter-seconds: ${WEIB_CACHE_TTL_JITTER_SECONDS:30}
  delayed-delete-ms: ${WEIB_CACHE_DELAYED_DELETE_MS:800}

# ============================================
# 读写分离 — 从库配置
# ============================================
# 生产环境：设置 enabled=true 并配置 replica URL
# 开发环境：保持 enabled=false（读写走同一数据库）
weib.datasource.replica:
  enabled: ${REPLICA_ENABLED:false}
  url: ${REPLICA_URL:jdbc:mysql://localhost:3306/weib?useSSL=true&serverTimezone=Asia/Shanghai}
  driver-class-name: com.mysql.cj.jdbc.Driver
  username: ${REPLICA_USERNAME:root}
  password: ${REPLICA_PASSWORD:}
  hikari:
    maximum-pool-size: 20
    minimum-idle: 5
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000

logging:
  level:
    root: warn
    com.weib: info
    com.weib.cache: info
    com.weib.service.ComplaintService: info
    com.weib.service.admin.AdminComplaintService: info
