<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="csrf-token" th:content="${session.csrf_token}">
  <title>处罚申诉 - 微招</title>
  <style>
    body{margin:0;background:#f5f7fb;color:#1f2937;font-family:Arial,"Microsoft YaHei",sans-serif}.page{max-width:960px;margin:0 auto;padding:32px 20px}.card{background:#fff;border-radius:14px;padding:24px;margin-bottom:20px;box-shadow:0 4px 18px rgba(15,23,42,.06)}h1{margin:0 0 8px;font-size:26px}label{display:block;margin:14px 0 6px;font-weight:600}input,textarea{box-sizing:border-box;width:100%;padding:10px;border:1px solid #d9e0ea;border-radius:8px;font-size:14px}textarea{min-height:120px;resize:vertical}button{margin-top:16px;background:#00a896;color:white;border:0;border-radius:8px;padding:10px 18px;cursor:pointer}.muted{color:#6b7280;font-size:13px}.item{border-top:1px solid #edf0f5;padding:14px 0}.status{font-size:12px;border-radius:999px;padding:3px 8px;background:#eef2ff}.error{color:#c2410c}.success{color:#047857}
  </style>
<link rel="stylesheet" href="/css/app-shell.css"><script src="/js/app-shell.js"></script></head>
<body>
<div class="page">
  <div class="card"><h1>处罚申诉</h1><p class="muted">账号受限时仍可提交申诉。请填写处罚 ID、申诉理由并提供真实证据。</p>
    <form id="appealForm">
      <label for="sanctionId">处罚 ID</label><input id="sanctionId" type="number" min="1" required>
      <label for="reason">申诉理由</label><textarea id="reason" minlength="2" maxlength="2000" required></textarea>
      <label for="evidence">证据图片（可选）</label><input id="evidence" type="file" accept="image/png,image/jpeg,image/gif,image/webp" multiple>
      <p id="message" class="muted"></p><button type="submit">提交申诉</button>
    </form>
  </div>
  <div class="card"><h2>我的申诉</h2><div id="appeals"><span class="muted">加载中...</span></div></div>
</div>
<script>
const csrf=document.querySelector('meta[name="csrf-token"]')?.content||'';
const headers={'Content-Type':'application/json','X-CSRF-TOKEN':csrf};
async function upload(file){const fd=new FormData();fd.append('file',file);const r=await fetch('/api/appeals/evidence',{method:'POST',headers:{'X-CSRF-TOKEN':csrf},body:fd});const j=await r.json();if(!r.ok)throw new Error(j.msg||'上传失败');return j.data.url}
async function load(){const r=await fetch('/api/appeals/mine');const j=await r.json();const box=document.getElementById('appeals');const list=j.data?.content||[];box.innerHTML=list.length?list.map(a=>`<div class="item"><b>#${a.id} / 处罚 #${a.sanctionId}</b> <span class="status">${a.status}</span><div>${a.reason}</div><div class="muted">提交时间：${a.createdAt||''}</div></div>`).join(''):'<span class="muted">暂无申诉</span>'}
document.getElementById('appealForm').addEventListener('submit',async e=>{e.preventDefault();const msg=document.getElementById('message');msg.className='muted';msg.textContent='提交中...';try{const files=[...document.getElementById('evidence').files];const evidenceUrls=[];for(const f of files.slice(0,5))evidenceUrls.push(await upload(f));const r=await fetch('/api/appeals',{method:'POST',headers,body:JSON.stringify({sanctionId:Number(document.getElementById('sanctionId').value),reason:document.getElementById('reason').value,evidenceUrls})});const j=await r.json();if(!r.ok)throw new Error(j.msg||'提交失败');msg.className='success';msg.textContent='申诉已提交';e.target.reset();load()}catch(err){msg.className='error';msg.textContent=err.message||'提交失败'}});load();
</script>
</body>
</html>
