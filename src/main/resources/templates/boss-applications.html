<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投递管理 - 微招</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo { 
            font-size: 24px; 
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links { display: flex; gap: 16px; }
        .nav-links a {
            color: #a0a0a0;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
            font-size: 14px;
        }
        .nav-links a:hover, .nav-links a.active {
            background: rgba(0,212,255,0.2);
            color: #00d4ff;
        }
        .logout-btn {
            background: rgba(255,255,255,0.1);
            color: #a0a0a0;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .logout-btn:hover { background: rgba(255,100,100,0.2); color: #ff6b6b; }
        
        .page-header { margin-bottom: 24px; }
        .page-title { font-size: 24px; }
        
        /* 筛选标签 */
        .filter-tabs { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .filter-tab {
            padding: 10px 20px;
            border-radius: 25px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .filter-tab:hover, .filter-tab.active {
            background: rgba(0,212,255,0.1);
            border-color: rgba(0,212,255,0.3);
            color: #00d4ff;
        }
        
        /* 投递列表 */
        .app-list { display: flex; flex-direction: column; gap: 16px; }
        .app-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .app-card:hover { border-color: rgba(0,212,255,0.3); }
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .app-job { font-size: 18px; font-weight: 600; color: #fff; }
        .status-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        .status-pending { background: rgba(255,193,7,0.2); color: #ffc107; }
        .status-viewed { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .status-accepted { background: rgba(16,185,129,0.2); color: #10b981; }
        .status-rejected { background: rgba(255,107,107,0.2); color: #ff6b6b; }
        
        .app-meta { display: flex; gap: 24px; color: #888; font-size: 14px; margin-bottom: 16px; }
        .app-meta span { display: flex; align-items: center; gap: 6px; }
        
        .app-actions { display: flex; gap: 12px; flex-wrap: wrap; }
        .action-btn {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .view-btn {
            background: rgba(0,212,255,0.1);
            color: #00d4ff;
            border: 1px solid rgba(0,212,255,0.3);
        }
        .view-btn:hover { background: rgba(0,212,255,0.2); }
        .accept-btn {
            background: rgba(16,185,129,0.2);
            color: #10b981;
            border: 1px solid rgba(16,185,129,0.3);
        }
        .accept-btn:hover { background: rgba(16,185,129,0.3); }
        .reject-btn {
            background: rgba(255,107,107,0.1);
            color: #ff6b6b;
            border: 1px solid rgba(255,107,107,0.3);
        }
        .reject-btn:hover { background: rgba(255,107,107,0.2); }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .empty-state .icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
        .empty-state h3 { font-size: 20px; margin-bottom: 10px; color: #888; }
        .empty-state p { color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">⚡ 微招 - BOSS管理后台</div>
            <div class="nav-links">
                <a href="/">← 返回首页</a>
                <a href="/boss">管理首页</a>
                <a href="/boss/jobs">职位管理</a>
                <a href="/boss/applications" class="active">投递管理</a>
            </div>
            <button class="logout-btn" onclick="location.href='/logout'">退出登录</button>
        </div>
        
        <div class="page-header">
            <h2 class="page-title">📋 投递管理</h2>
        </div>
        
        <!-- 筛选标签 -->
        <div class="filter-tabs">
            <div class="filter-tab active" data-filter="all">全部</div>
            <div class="filter-tab" data-filter="pending">待处理</div>
            <div class="filter-tab" data-filter="viewed">已查看</div>
            <div class="filter-tab" data-filter="accepted">已接收</div>
            <div class="filter-tab" data-filter="rejected">已拒绝</div>
        </div>
        
        <!-- 投递列表 -->
        <div class="app-list" id="appList">
            <div class="app-card" th:each="app : ${applications}" th:data-status="${app.status}">
                <div class="app-header">
                    <div class="app-job">
                        💼 <span th:text="${app.jobTitle ?: '职位已删除'}">职位名称</span>
                    </div>
                    <span class="status-badge" 
                          th:classappend="${'pending' == app.status} ? 'status-pending' : 
                                          (${'viewed' == app.status} ? 'status-viewed' : 
                                          (${'accepted' == app.status} ? 'status-accepted' : 'status-rejected'))"
                          th:text="${'pending' == app.status} ? '待处理' : 
                                   (${'viewed' == app.status} ? '已查看' : 
                                   (${'accepted' == app.status} ? '已接收' : '已拒绝'))">
                        待处理
                    </span>
                </div>
                <div class="app-meta">
                    <span>👤 求职者ID: <span th:text="${app.userId}">1</span></span>
                    <span>📄 简历ID: <span th:text="${app.resumeId}">1</span></span>
                    <span>🕐 投递时间: <span th:text="${#temporals.format(app.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</span></span>
                </div>
                <div class="app-actions">
                    <button class="action-btn view-btn" th:data-id="${app.id}" th:data-status="'viewed'">标记已查看</button>
                    <button class="action-btn accept-btn" th:data-id="${app.id}" th:data-status="'accepted'">✅ 接收</button>
                    <button class="action-btn reject-btn" th:data-id="${app.id}" th:data-status="'rejected'">❌ 拒绝</button>
                </div>
            </div>
        </div>
        
        <!-- 空状态 -->
        <div class="empty-state" th:if="${#lists.isEmpty(applications)}">
            <div class="icon">📋</div>
            <h3>暂无投递</h3>
            <p>还没有求职者投递您的职位，发布更多职位吸引人才吧</p>
        </div>
    </div>
    
    <script>
    // 筛选功能
    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            // 更新标签状态
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            
            // 筛选卡片
            const filter = this.dataset.filter;
            document.querySelectorAll('.app-card').forEach(card => {
                if (filter === 'all' || card.dataset.status === filter) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        });
    });
    
    // 状态更新
    document.querySelectorAll('.action-btn[data-status]').forEach(btn => {
        if (btn.dataset.id) {
            btn.addEventListener('click', async function() {
                const id = this.dataset.id;
                const status = this.dataset.status;
                
                try {
                    const resp = await fetch(`/boss/application/${id}/status`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: `status=${status}`
                    });
                    const data = await resp.json();
                    
                    if (data.code === 200) {
                        alert('状态更新成功');
                        location.reload();
                    } else {
                        alert(data.msg);
                    }
                } catch (e) {
                    alert('操作失败，请重试');
                }
            });
        }
    });
    </script>
</body>
</html>
