<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" th:content="${csrf_token}">
    <title>简历管理 - 微招</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #00c2b3, #5dd5c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links { display: flex; gap: 12px; flex-wrap: wrap; }
        .nav-links a {
            color: #9fa3af;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
            font-size: 14px;
            position: relative;
        }
        .nav-links a:hover, .nav-links a.active {
            background: rgba(0,194,179,0.2);
            color: #00c2b3;
        }
        .badge {
            position: absolute;
            top: 0;
            right: 2px;
            background: #ef505e;
            color: #fff;
            font-size: 10px;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }
        .logout-btn {
            background: rgba(255,255,255,0.1);
            color: #9fa3af;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .logout-btn:hover { background: rgba(239,80,94,0.2); color: #ef505e; }

        .page-header { margin-bottom: 24px; }
        .page-title { font-size: 24px; color: #fff; }

        .filter-tabs { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .filter-tab {
            padding: 10px 20px;
            border-radius: 25px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .filter-tab:hover, .filter-tab.active {
            background: rgba(0,194,179,0.1);
            border-color: rgba(0,194,179,0.3);
            color: #00c2b3;
        }

        .app-list { display: flex; flex-direction: column; gap: 14px; }
        .app-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 22px 26px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .app-card:hover { border-color: rgba(0,194,179,0.3); }
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .app-job { font-size: 18px; font-weight: 600; color: #fff; }
        .status-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        .status-pending { background: rgba(255,193,7,0.2); color: #ffc107; }
        .status-viewed { background: rgba(94,150,242,0.2); color: #5e96f2; }
        .status-accepted { background: rgba(16,185,129,0.2); color: #10b981; }
        .status-rejected { background: rgba(239,80,94,0.2); color: #ef505e; }

        .app-meta { display: flex; gap: 20px; color: #888; font-size: 14px; margin-bottom: 8px; flex-wrap: wrap; }
        .seeker-info {
            display: flex; gap: 14px; align-items: center;
            padding: 10px 14px; margin: 10px 0;
            background: rgba(0,194,179,0.05);
            border-radius: 10px;
            border: 1px solid rgba(0,194,179,0.1);
        }
        .seeker-name { color: #00c2b3; font-weight: 500; font-size: 15px; }

        .app-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .action-btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .view-btn {
            background: rgba(0,194,179,0.1);
            color: #00c2b3;
            border: 1px solid rgba(0,194,179,0.3);
        }
        .view-btn:hover { background: rgba(0,194,179,0.2); }
        .accept-btn {
            background: rgba(16,185,129,0.2);
            color: #10b981;
            border: 1px solid rgba(16,185,129,0.3);
        }
        .accept-btn:hover { background: rgba(16,185,129,0.3); }
        .reject-btn {
            background: rgba(239,80,94,0.1);
            color: #ef505e;
            border: 1px solid rgba(239,80,94,0.3);
        }
        .reject-btn:hover { background: rgba(239,80,94,0.2); }
        .chat-btn {
            background: linear-gradient(135deg, rgba(0,194,179,0.2), rgba(93,213,200,0.2));
            color: #00c2b3;
            border: 1px solid rgba(0,194,179,0.4);
            text-decoration: none;
        }
        .chat-btn:hover { background: rgba(0,194,179,0.3); }

        /* 简历预览 */
        .resume-preview {
            display: none;
            margin-top: 14px;
            padding: 16px 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.7;
            color: #b0b0b0;
            max-height: 300px;
            overflow-y: auto;
        }
        .resume-preview.show { display: block; }

        /* 简历详情弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-dialog {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 30px;
            max-width: 650px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            color: #e0e0e0;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .modal-title { font-size: 20px; color: #fff; }
        .modal-close {
            background: none; border: none; color: #888;
            font-size: 24px; cursor: pointer; padding: 4px 10px;
        }
        .modal-close:hover { color: #fff; }
        .resume-field { margin-bottom: 14px; }
        .resume-field-label { color: #666; font-size: 13px; margin-bottom: 4px; }
        .resume-field-value { color: #d0d0d0; font-size: 15px; line-height: 1.6; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .empty-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
        .empty-state h3 { font-size: 20px; margin-bottom: 10px; color: #888; }
        .empty-state p { color: #555; }

        /* 备注弹窗 */
        .note-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .note-modal-overlay.show { display: flex; }
        .note-modal-dialog {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 30px;
            max-width: 480px;
            width: 90%;
            color: #e0e0e0;
        }
        .note-modal-title {
            font-size: 18px;
            color: #fff;
            margin-bottom: 8px;
        }
        .note-modal-subtitle { font-size: 14px; color: #888; margin-bottom: 20px; }
        .note-textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
            outline: none;
            font-family: inherit;
        }
        .note-textarea:focus { border-color: #00c2b3; }
        .note-textarea::placeholder { color: #555; }
        .note-modal-buttons { display: flex; gap: 12px; margin-top: 20px; justify-content: flex-end; }
        .note-cancel-btn {
            padding: 10px 24px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: #888;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .note-cancel-btn:hover { color: #fff; }
        .note-confirm-btn {
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .note-confirm-btn.accept { background: rgba(16,185,129,0.3); }
        .note-confirm-btn.accept:hover { background: rgba(16,185,129,0.5); }
        .note-confirm-btn.reject { background: rgba(239,80,94,0.3); }
        .note-confirm-btn.reject:hover { background: rgba(239,80,94,0.5); }
        .note-confirm-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">微招 - Boss工作台</div>
            <div class="nav-links">
                <a href="/">职位大厅</a>
                <a href="/chat">
                    消息
                    <span class="badge" th:if="${unreadMsgCount > 0}" th:text="${unreadMsgCount}">0</span>
                </a>
                <a href="/boss">Boss入口</a>
                <a href="/boss/jobs">职位管理</a>
                <a href="/boss/applications" class="active">简历管理</a>
            </div>
            <form id="logoutForm" method="post" action="/logout" style="display:none">
                <input type="hidden" name="_csrf" th:value="${csrf_token}" />
            </form>
            <button class="logout-btn" onclick="document.getElementById('logoutForm').submit()">退出登录</button>
        </div>

        <div class="page-header">
            <h2 class="page-title">收到的简历</h2>
        </div>

        <div class="filter-tabs">
            <div class="filter-tab active" data-filter="all">全部</div>
            <div class="filter-tab" data-filter="pending">待处理</div>
            <div class="filter-tab" data-filter="viewed">已查看</div>
            <div class="filter-tab" data-filter="accepted">已通过</div>
            <div class="filter-tab" data-filter="rejected">已拒绝</div>
        </div>

        <div class="app-list" id="appList">
            <div class="app-card" th:each="app : ${applications}" th:data-status="${app.status}">
                <div class="app-header">
                    <div class="app-job" th:text="${app.jobTitle ?: '职位已删除'}">职位名称</div>
                    <span class="status-badge"
                          th:classappend="${'pending' == app.status ? 'status-pending' :
                                          ('viewed' == app.status ? 'status-viewed' :
                                          ('accepted' == app.status ? 'status-accepted' : 'status-rejected'))}"
                          th:text="${'pending' == app.status ? '待处理' :
                                   ('viewed' == app.status ? '已查看' :
                                   ('accepted' == app.status ? '已通过' : '已拒绝'))}">
                        待处理
                    </span>
                </div>

                <!-- 求职者信息 -->
                <div class="seeker-info" th:if="${seekerNames != null && seekerNames.containsKey(app.userId)}">
                    <span>👤</span>
                    <span class="seeker-name" th:text="${seekerNames[app.userId]}">求职者</span>
                    <span style="color:#666;font-size:13px;">投递了该职位</span>
                    <span style="color:#666;font-size:12px;margin-left:auto;" th:text="${#temporals.format(app.createdAt, 'yyyy-MM-dd HH:mm')}">时间</span>
                </div>

                <div class="app-meta">
                    <span>简历ID: <span th:text="${app.resumeId}">1</span></span>
                    <span th:if="${seekerResumeIds != null && seekerResumeIds.containsKey(app.userId)}">
                        投递时间: <span th:text="${#temporals.format(app.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</span>
                    </span>
                </div>

                <!-- 简历摘要 -->
                <div class="resume-preview" th:id="'summary-' + ${app.id}"
                     th:if="${seekerResumeSummary != null && seekerResumeSummary.containsKey(app.userId)}"
                     th:text="${seekerResumeSummary[app.userId]}">简历摘要</div>

                <div class="app-actions">
                    <button class="action-btn view-btn" th:data-id="${encodedApplicationIds[app.id]}"
                            onclick="toggleResumeSummary(this)" th:if="${seekerResumeSummary != null && seekerResumeSummary.containsKey(app.userId)}">
                        查看简历摘要
                    </button>
                    <button class="action-btn view-btn" th:attr="data-user-id=${encodedSeekerIds[app.userId]}"
                            onclick="viewFullResume(this)" th:if="${seekerResumeIds != null && seekerResumeIds.containsKey(app.userId)}">
                        查看完整简历
                    </button>
                    <a th:href="@{/chat/{id}(id=${encodedApplicationIds[app.id]})}" class="action-btn chat-btn" style="text-decoration:none;">沟通</a>
                    <button class="action-btn view-btn" th:data-id="${encodedApplicationIds[app.id]}" th:data-status="'viewed'" onclick="updateStatus(this)">标记已查看</button>
                    <button class="action-btn accept-btn" th:data-id="${encodedApplicationIds[app.id]}" th:data-status="'accepted'" onclick="updateStatus(this)">通过</button>
                    <button class="action-btn reject-btn" th:data-id="${encodedApplicationIds[app.id]}" th:data-status="'rejected'" onclick="updateStatus(this)">拒绝</button>
                </div>
            </div>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(applications)}">
            <div class="empty-icon">📥</div>
            <h3>暂无收到的简历</h3>
            <p>还没有求职者投递您的职位，发布更多职位吸引人才吧</p>
        </div>
    </div>

    <!-- 备注弹窗 -->
    <div class="note-modal-overlay" id="noteModal">
        <div class="note-modal-dialog">
            <div class="note-modal-title" id="noteModalTitle">处理申请</div>
            <div class="note-modal-subtitle">给求职者留言（可选），对方会收到通知</div>
            <textarea class="note-textarea" id="noteTextarea"
                      placeholder="如：简历很匹配，我们会尽快安排面试；或简单说明不合适的原因..."></textarea>
            <div class="note-modal-buttons">
                <button class="note-cancel-btn" onclick="closeNoteModal()">取消</button>
                <button class="note-confirm-btn" id="noteConfirmBtn" onclick="confirmStatusUpdate()">确认</button>
            </div>
        </div>
    </div>

    <!-- 简历弹窗 -->
    <div class="modal-overlay" id="resumeModal" onclick="if(event.target===this)closeResumeModal()">
        <div class="modal-dialog" id="resumeModalContent"></div>
    </div>

    <script>
    // 筛选
    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            const filter = this.dataset.filter;
            document.querySelectorAll('.app-card').forEach(card => {
                card.style.display = (filter === 'all' || card.dataset.status === filter) ? 'block' : 'none';
            });
        });
    });

    // 切换简历摘要
    function toggleResumeSummary(btn) {
        const id = btn.dataset.id;
        const el = document.getElementById('summary-' + id);
        if (el) {
            el.classList.toggle('show');
            btn.textContent = el.classList.contains('show') ? '隐藏简历摘要' : '查看简历摘要';
        }
    }

    // 查看完整简历
    async function viewFullResume(btn) {
        const userId = btn.dataset.userId;
        btn.textContent = '加载中...';
        btn.disabled = true;
        try {
            const resp = await fetch('/boss/resume/' + userId);
            const data = await resp.json();
            if (data.code === 200) {
                const resume = data.data.resume;
                const name = data.data.seekerName;
                let html = '<div class="modal-header"><div class="modal-title">' + escapeHtml(name) + ' 的简历</div>' +
                    '<button class="modal-close" onclick="closeResumeModal()">✕</button></div>';
                if (resume.realName) html += field('真实姓名', resume.realName);
                if (resume.gender) html += field('性别', resume.gender);
                if (resume.birthday) html += field('出生日期', resume.birthday);
                if (resume.phone) html += field('手机', resume.phone);
                if (resume.email) html += field('邮箱', resume.email);
                if (resume.education) html += field('学历', resume.education);
                if (resume.school) html += field('学校', resume.school);
                if (resume.major) html += field('专业', resume.major);
                if (resume.skills) html += field('技能特长', resume.skills);
                if (resume.workExperience) html += field('工作经历', resume.workExperience);
                if (resume.projectExperience) html += field('项目经验', resume.projectExperience);
                if (resume.selfIntroduction) html += field('自我介绍', resume.selfIntroduction);
                document.getElementById('resumeModalContent').innerHTML = html;
                document.getElementById('resumeModal').classList.add('show');
            } else {
                alert(data.msg);
            }
        } catch(e) {
            alert('加载失败');
        }
        btn.textContent = '查看完整简历';
        btn.disabled = false;
    }

    function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function field(label, value) {
        return '<div class="resume-field"><div class="resume-field-label">' + escapeHtml(label) + '</div>' +
            '<div class="resume-field-value">' + escapeHtml(value) + '</div></div>';
    }

    function closeResumeModal() {
        document.getElementById('resumeModal').classList.remove('show');
    }

    // 更新状态 — 已查看直接操作，通过/拒绝弹出备注框
    var pendingAppId = null;
    var pendingStatus = null;

    function updateStatus(btn) {
        const status = btn.dataset.status;
        if (status === 'viewed') {
            doUpdateStatus(btn.dataset.id, status, null);
            return;
        }
        pendingAppId = btn.dataset.id;
        pendingStatus = status;
        const isAccept = status === 'accepted';
        document.getElementById('noteModalTitle').textContent = isAccept ? '✅ 通过申请' : '❌ 拒绝申请';
        document.getElementById('noteModalSubtitle').textContent = isAccept
            ? '通过后求职者会收到通知，可留言告知下一步安排'
            : '拒绝后求职者会收到通知，建议简单说明原因';
        var confirmBtn = document.getElementById('noteConfirmBtn');
        confirmBtn.textContent = isAccept ? '确认通过' : '确认拒绝';
        confirmBtn.className = 'note-confirm-btn ' + (isAccept ? 'accept' : 'reject');
        document.getElementById('noteTextarea').value = '';
        document.getElementById('noteModal').classList.add('show');
    }

    function closeNoteModal() {
        document.getElementById('noteModal').classList.remove('show');
        pendingAppId = null;
        pendingStatus = null;
    }

    async function confirmStatusUpdate() {
        if (!pendingAppId || !pendingStatus) return;
        var btn = document.getElementById('noteConfirmBtn');
        btn.disabled = true;
        btn.textContent = '处理中...';
        var note = document.getElementById('noteTextarea').value.trim();
        var body = 'status=' + pendingStatus;
        if (note) {
            body += '&bossNote=' + encodeURIComponent(note);
        }
        try {
            var csrfToken = document.querySelector('meta[name="csrf-token"]')?.content || '';
            var resp = await fetch('/boss/application/' + pendingAppId + '/status', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRF-Token': csrfToken
                },
                body: body
            });
            var data = await resp.json();
            if (data.code === 200) {
                location.reload();
            } else {
                alert(data.msg);
                btn.disabled = false;
                btn.textContent = pendingStatus === 'accepted' ? '确认通过' : '确认拒绝';
            }
        } catch(e) {
            alert('操作失败');
            btn.disabled = false;
            btn.textContent = pendingStatus === 'accepted' ? '确认通过' : '确认拒绝';
        }
    }

    async function doUpdateStatus(id, status, note) {
        var body = 'status=' + status;
        if (note) body += '&bossNote=' + encodeURIComponent(note);
        var csrfToken = document.querySelector('meta[name="csrf-token"]')?.content || '';
        var resp = await fetch('/boss/application/' + id + '/status', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-CSRF-Token': csrfToken
            },
            body: body
        });
        var data = await resp.json();
        if (data.code === 200) {
            location.reload();
        } else {
            alert(data.msg);
        }
    }

    // 点击弹窗背景关闭
    document.getElementById('noteModal').addEventListener('click', function(e) {
        if (e.target === this) closeNoteModal();
    });
    </script>
</body>
</html>
