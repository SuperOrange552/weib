<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss后台 - 微招</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* 顶部导航 */
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #00c2b3, #5dd5c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links { display: flex; gap: 12px; flex-wrap: wrap; }
        .nav-links a {
            color: #9fa3af;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
            font-size: 14px;
            position: relative;
        }
        .nav-links a:hover, .nav-links a.active {
            background: rgba(0,194,179,0.2);
            color: #00c2b3;
        }
        .badge {
            position: absolute;
            top: 0;
            right: 2px;
            background: #ef505e;
            color: #fff;
            font-size: 10px;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }
        .logout-btn {
            background: rgba(255,255,255,0.1);
            color: #9fa3af;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: rgba(239,80,94,0.2);
            color: #ef505e;
        }

        /* 欢迎信息 */
        .welcome {
            background: linear-gradient(135deg, rgba(0,194,179,0.1), rgba(93,213,200,0.1));
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(0,194,179,0.2);
        }
        .welcome h2 { font-size: 24px; margin-bottom: 8px; }
        .welcome p { color: #888; }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0,194,179,0.3);
        }
        .stat-icon { font-size: 40px; margin-bottom: 12px; }
        .stat-number { font-size: 36px; font-weight: bold; color: #00c2b3; }
        .stat-label { color: #888; font-size: 14px; margin-top: 8px; }

        /* 公司信息 */
        .company-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 24px;
        }
        .company-card h3 { font-size: 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .company-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .info-item { display: flex; gap: 12px; }
        .info-label { color: #666; min-width: 80px; }
        .info-value { color: #e0e0e0; }

        /* 快捷操作 */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .action-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .action-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0,194,179,0.3);
            background: rgba(0,194,179,0.05);
        }
        .action-icon { font-size: 32px; margin-bottom: 12px; }
        .action-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: #fff; }
        .action-desc { font-size: 14px; color: #666; }

        /* 入驻提示 */
        .register-prompt {
            background: linear-gradient(135deg, rgba(255,193,7,0.1), rgba(250,106,67,0.1));
            border-radius: 16px;
            padding: 40px;
            border: 1px solid rgba(255,193,7,0.3);
            text-align: center;
        }
        .register-prompt h3 { font-size: 24px; margin-bottom: 16px; }
        .register-prompt p { color: #888; margin-bottom: 24px; }
        .register-btn {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #ffc107, #fa6a43);
            color: #000;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .register-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,193,7,0.4);
        }
        .status-pending { background: rgba(255,193,7,0.2); color: #ffc107; }
        .status-viewed { background: rgba(94,150,242,0.2); color: #5e96f2; }
        .status-accepted { background: rgba(16,185,129,0.2); color: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部导航 -->
        <div class="header">
            <div class="logo">◆ 微招 - Boss工作台</div>
            <div class="nav-links">
                <a href="/">职位大厅</a>
                <a href="/chat">
                    消息
                    <span class="badge" th:if="${unreadMsgCount > 0}" th:text="${unreadMsgCount}">0</span>
                </a>
                <a href="/boss" class="active">Boss入口</a>
                <a href="/boss/jobs">职位管理</a>
                <a href="/boss/applications">简历管理</a>
            </div>
            <form id="logoutForm" method="post" action="/logout" style="display:none">
                <input type="hidden" name="_csrf" th:value="${csrf_token}" />
            </form>
            <button class="logout-btn" onclick="document.getElementById('logoutForm').submit()">退出登录</button>
        </div>

        <!-- 欢迎信息 -->
        <div class="welcome">
            <h2>👢 欢迎回来, <span th:text="${user.nickname ?: user.username}">BOSS</span>!</h2>
            <p>在这里管理您的公司和职位，查看求职者投递的简历</p>
        </div>

        <!-- 需要入驻 -->
        <div class="register-prompt" th:if="${needRegister}">
            <h3>🏢 您还没有创建公司信息</h3>
            <p>创建公司信息后即可发布职位，接收求职者投递的简历</p>
            <a href="/boss/register" class="register-btn">创建公司信息</a>
        </div>

        <!-- Boss已入驻 -->
        <th:block th:if="${company != null}">
            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">💼</div>
                    <div class="stat-number" th:text="${jobCount ?: 0}">0</div>
                    <div class="stat-label">在招职位</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📋</div>
                    <div class="stat-number" th:text="${applicationCount ?: 0}">0</div>
                    <div class="stat-label">收到简历</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-number" th:text="${pendingApps ?: 0}" style="color:#ffc107;">0</div>
                    <div class="stat-label">待处理</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-number" th:text="${acceptedApps ?: 0}" style="color:#10b981;">0</div>
                    <div class="stat-label">已通过</div>
                </div>
            </div>

            <!-- 公司信息 -->
            <div class="company-card">
                <h3>🏢 我的公司</h3>
                <div class="company-info">
                    <div class="info-item">
                        <span class="info-label">公司名称</span>
                        <span class="info-value" th:text="${company.name}">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">所属行业</span>
                        <span class="info-value" th:text="${company.industry ?: '未填写'}">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">公司规模</span>
                        <span class="info-value" th:text="${company.scale ?: '未填写'}">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">公司地址</span>
                        <span class="info-value" th:text="${company.address ?: '未填写'}">-</span>
                    </div>
                </div>
                <a href="/boss/company/edit" style="display:inline-flex;align-items:center;gap:6px;margin-top:16px;padding:8px 20px;border-radius:20px;background:rgba(0,194,179,0.1);color:#00c2b3;border:1px solid rgba(0,194,179,0.2);text-decoration:none;font-size:14px;transition:all 0.3s;">编辑公司信息</a>
            </div>

            <!-- 最近投递 -->
            <div th:if="${not #lists.isEmpty(recentApps)}" style="margin-bottom:24px;">
                <h3 style="font-size:18px;color:#fff;margin-bottom:14px;">最近投递</h3>
                <div style="display:flex;flex-direction:column;gap:10px;">
                    <div th:each="app : ${recentApps}" style="background:rgba(255,255,255,0.05);border-radius:12px;padding:14px 20px;border:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;align-items:center;">
                        <div>
                            <span style="color:#fff;font-weight:500;" th:text="${app.jobTitle}">职位名称</span>
                            <span style="color:#666;font-size:13px;margin-left:12px;" th:text="${#temporals.format(app.createdAt, 'yyyy-MM-dd')}">日期</span>
                        </div>
                        <span style="padding:4px 12px;border-radius:10px;font-size:12px;"
                              th:classappend="${app.status == 'pending' ? 'status-pending' : (app.status == 'accepted' ? 'status-accepted' : 'status-viewed')}"
                              th:text="${app.status == 'pending' ? '待处理' : (app.status == 'accepted' ? '已通过' : '已查看')}">状态</span>
                    </div>
                </div>
            </div>

            <!-- 快捷操作 -->
            <div class="quick-actions">
                <a href="/boss/job/new" class="action-card">
                    <div class="action-icon">✅</div>
                    <div class="action-title">发布新职位</div>
                    <div class="action-desc">创建新的招聘信息，吸引优秀人才</div>
                </a>
                <a href="/boss/jobs" class="action-card">
                    <div class="action-icon">📝</div>
                    <div class="action-title">管理职位</div>
                    <div class="action-desc">编辑、关闭或删除已发布的职位</div>
                </a>
                <a href="/boss/applications" class="action-card">
                    <div class="action-icon">📥</div>
                    <div class="action-title">查看简历</div>
                    <div class="action-desc">查看并处理求职者的简历投递</div>
                </a>
            </div>
        </th:block>
    </div>
</body>
</html>
