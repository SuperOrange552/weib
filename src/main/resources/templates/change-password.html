<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 微招</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 420px;
            max-width: 90vw;
        }
        .card h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #00c2b3, #5dd5c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; color: #9fa3af; font-size: 14px; }
        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-input:focus { border-color: #00c2b3; box-shadow: 0 0 20px rgba(0,194,179,0.2); }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00c2b3, #5dd5c8);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(0,194,179,0.4); }
        .error-msg {
            background: rgba(239,80,94,0.1);
            border: 1px solid rgba(239,80,94,0.3);
            border-radius: 10px;
            padding: 14px;
            color: #ef505e;
            margin-bottom: 20px;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a { color: #666; text-decoration: none; font-size: 14px; }
        .back-link a:hover { color: #00c2b3; }
    </style>
<link rel="stylesheet" href="/css/app-shell.css"></head>
<body>
    <div class="card">
        <h1>🔑 修改密码</h1>

        <div class="error-msg" th:if="${error}" th:text="${error}"></div>

        <form action="/user/change-password" method="post">
            <input type="hidden" name="_csrf" th:value="${csrf_token}">

            <div class="form-group">
                <label class="form-label">原密码</label>
                <input type="password" name="oldPassword" maxlength="64" autocomplete="current-password" class="form-input" placeholder="请输入原密码" required>
            </div>
            <div class="form-group">
                <label class="form-label">新密码</label>
                <input type="password" name="newPassword" minlength="8" maxlength="64" autocomplete="new-password" class="form-input" placeholder="8-64位，含大小写字母和数字" required>
            </div>
            <div class="form-group">
                <label class="form-label">确认新密码</label>
                <input type="password" name="confirmPassword" minlength="8" maxlength="64" autocomplete="new-password" class="form-input" placeholder="再次输入新密码" required>
            </div>

            <button type="submit" class="submit-btn">确认修改</button>
        </form>

        <div class="back-link">
            <a href="/">← 返回首页</a>
        </div>
    </div>
<script src="/js/submit-guard.js"></script>
</body>
</html>
