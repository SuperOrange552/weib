<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息 - 微招</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 30px 20px; }

        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(135deg, #00c2b3, #5dd5c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links { display: flex; gap: 12px; flex-wrap: wrap; }
        .nav-links a {
            color: #9fa3af;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
            font-size: 14px;
            position: relative;
        }
        .nav-links a:hover, .nav-links a.active {
            background: rgba(0,194,179,0.2);
            color: #00c2b3;
        }
        .badge {
            position: absolute;
            top: 0;
            right: 2px;
            background: #ef505e;
            color: #fff;
            font-size: 10px;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }
        .logout-btn {
            background: rgba(255,255,255,0.1);
            color: #9fa3af;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .logout-btn:hover { background: rgba(239,80,94,0.2); color: #ef505e; }

        .page-title { font-size: 22px; color: #fff; margin-bottom: 24px; }

        .conv-list { display: flex; flex-direction: column; gap: 10px; }
        .conv-card {
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 18px 24px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
        }
        .conv-card:hover {
            border-color: rgba(0,194,179,0.3);
            transform: translateX(5px);
        }
        .conv-info { flex: 1; }
        .conv-title { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 4px; }
        .conv-meta { font-size: 13px; color: #888; }
        .conv-lastmsg { font-size: 12px; color: #666; margin-top: 6px; max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .conv-right { text-align: right; flex-shrink: 0; }
        .conv-time { font-size: 11px; color: #555; margin-bottom: 6px; }
        .unread-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 22px;
            height: 22px;
            border-radius: 11px;
            background: #ef505e;
            color: #fff;
            font-size: 12px;
            padding: 0 6px;
        }
        .conv-arrow { color: #666; font-size: 18px; margin-left: 10px; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
        .empty-state h3 { color: #888; margin-bottom: 8px; }
        .empty-state p { color: #555; font-size: 14px; }
    </style>
<link rel="stylesheet" href="/css/app-shell.css"><script src="/js/app-shell.js"></script></head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">微招</div>
            <div class="nav-links">
                <a href="/">职位大厅</a>
                <th:block th:if="${user.role == 'seeker'}">
                    <a href="/notifications">
                        通知
                        <span class="badge" th:if="${unreadNotifCount > 0}" th:text="${unreadNotifCount}">0</span>
                    </a>
                    <a href="/my/applications">我的投递</a>
                    <a href="/my/favorites">收藏</a>
                    <a href="/resume">我的简历</a>
                    <a href="/chat" class="active">
                        消息
                        <span class="badge" th:if="${unreadMsgCount > 0}" th:text="${unreadMsgCount}">0</span>
                    </a>
                </th:block>
                <th:block th:if="${user.role == 'boss'}">
                    <a href="/chat" class="active">
                        消息
                        <span class="badge" th:if="${unreadMsgCount > 0}" th:text="${unreadMsgCount}">0</span>
                    </a>
                    <a href="/boss">Boss工作台</a>
                </th:block>
            </div>
            <form id="logoutForm" method="post" action="/logout" style="display:none">
                <input type="hidden" name="_csrf" th:value="${csrf_token}" />
            </form>
            <button class="logout-btn" onclick="document.getElementById('logoutForm').submit()">退出</button>
        </div>

        <h2 class="page-title">消息列表</h2>

        <div class="conv-list" th:if="${not #lists.isEmpty(conversations)}">
            <a th:href="@{/chat/{id}(id=${conv.encodedApplicationId})}" class="conv-card" th:each="conv : ${conversations}">
                <div class="conv-info">
                    <div class="conv-title" th:text="${conv.jobTitle}">职位名称</div>
                    <div class="conv-meta">
                        <span th:if="${user.role == 'seeker'}" th:text="${conv.companyName}">公司名称</span>
                        <span th:if="${user.role == 'boss'}" th:text="${conv['seekerName'] ?: '求职者'}">求职者</span>
                        <span th:if="${user.role == 'boss'}" style="margin-left:8px;color:#555;font-size:12px;" th:text="${conv.companyName}"></span>
                    </div>
                    <div class="conv-lastmsg" th:if="${conv['lastMsgText'] != null}" th:text="${conv['lastMsgText']}">最后消息预览</div>
                </div>
                <div class="conv-right">
                    <div class="conv-time" th:if="${conv['lastMsgTimeStr'] != null}" th:text="${conv['lastMsgTimeStr']}">时间</div>
                    <span class="unread-badge" th:if="${conv.unread > 0}" th:text="${conv.unread}">0</span>
                    <span class="conv-arrow">→</span>
                </div>
            </a>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(conversations)}">
            <div class="empty-icon">💬</div>
            <h3>暂无对话</h3>
            <p>投递职位后即可与Boss沟通，或等待求职者联系你</p>
        </div>
    </div>
<script src="/js/submit-guard.js"></script>
</body>
</html>
