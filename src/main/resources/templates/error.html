<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>错误 - 微招</title>
  <style>
    body { font-family: sans-serif; display:flex; align-items:center; justify-content:center; 
           height:100vh; margin:0; background:#f3f4f6; }
    .card { background:#fff; padding:48px; border-radius:8px; box-shadow:0 4px 6px rgba(0,0,0,.1);
            text-align:center; max-width:420px; }
    h1 { color:#dc2626; font-size:24px; margin:0 0 12px; }
    p { color:#6b7280; font-size:14px; margin:0 0 24px; }
    a { color:#2563eb; text-decoration:none; font-size:14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚠ 出错了</h1>
    <p th:text="${message} ?: '服务器内部错误，请稍后重试'"></p>
    <a href="/">← 返回首页</a>
  </div>
</body>
</html>
