<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>服务器错误 - 微招</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           display:flex; align-items:center; justify-content:center;
           min-height:100vh; background:#f0f2f5; color:#333; }
    .box { background:#fff; padding:48px 40px; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,.08);
           text-align:center; max-width:440px; width:90%; }
    h1 { font-size:72px; color:#dc2626; line-height:1; margin-bottom:12px; }  
    h2 { font-size:18px; font-weight:600; margin-bottom:8px; }
    p { font-size:14px; color:#888; margin-bottom:24px; }
    a { display:inline-block; padding:10px 28px; background:#3b82f6; color:#fff;
        border-radius:6px; text-decoration:none; font-size:14px; transition:background .2s; }
    a:hover { background:#2563eb; }
  </style>
</head>
<body>
  <div class="box">
    <h1>500</h1>
    <h2>服务器内部错误</h2>
    <p>抱歉，服务器处理请求时出现异常，请稍后重试</p>
    <a href="/">返回首页</a>
  </div>
</body>
</html>
