<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="csrf-token" th:content="${csrf_token}">
    <title>发布帖子 - 微招</title>
    <link rel="stylesheet" href="/css/forum.css">
    <link rel="stylesheet" href="/css/app-shell.css">
<script src="/js/app-shell.js"></script></head>
<body>
<main class="forum-page light-surface">
    <nav class="forum-system-nav" aria-label="论坛导航">
        <a class="forum-system-back"
           th:href="${activeRole == 'BOSS' ? '/boss' : '/'}"
           th:text="${activeRole == 'BOSS' ? '← 返回Boss工作台' : '← 返回职位大厅'}">← 返回职位大厅</a>
        <a class="forum-nav-link" href="/forum">← 返回论坛首页</a>
    </nav>
    <form id="compose" class="forum-compose" style="margin-top:16px">
        <h1>发布帖子</h1>
        <label for="sectionId">板块</label>
        <select id="sectionId" required></select>
        <label for="title">标题</label>
        <input id="title" required minlength="2" maxlength="120" placeholder="请输入清晰的标题">
        <label for="content">正文</label>
        <textarea id="content" required minlength="2" maxlength="10000" placeholder="分享你的经验或问题"></textarea>
        <label for="tags">标签（中文或英文逗号分隔，最多 5 个）</label>
        <input id="tags" maxlength="150" placeholder="面试，简历,求职">
        <label>图片（可选）</label>
        <div id="upload" class="forum-upload" role="button" tabindex="0">
            <input id="images" type="file" accept="image/*" multiple>
            <strong>点击选择图片，或将图片拖到这里</strong>
            <small>支持 PNG、JPG、GIF、WEBP，单张不超过 10MB</small>
        </div>
        <div id="previews" class="forum-previews" aria-live="polite"></div>
        <div id="message" class="forum-error" role="alert"></div>
        <button class="forum-btn" type="submit">发布</button>
    </form>
</main>
<script src="/js/forum-compose.js"></script>
</body>
</html>
