<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="csrf-token" th:content="${session.csrf_token}"><title>发布帖子 - 微招</title><link rel="stylesheet" href="/css/forum.css"></head><body><main class="forum-page"><a href="/forum">← 返回论坛</a><form id="compose" class="forum-compose" style="margin-top:16px"><h1>发布帖子</h1><label>板块</label><select id="sectionId" required></select><label>标题</label><input id="title" required minlength="2" maxlength="120"><label>正文</label><textarea id="content" required minlength="2" maxlength="10000"></textarea><label>标签（逗号分隔，最多 5 个）</label><input id="tags" maxlength="150" placeholder="面试,简历"><label>图片地址（每行一个，需先上传）</label><textarea id="images" rows="3" placeholder="/uploads/forum/example.png"></textarea><div id="message" class="forum-error"></div><button class="forum-btn" type="submit">发布</button></form></main><script src="/js/forum-compose.js"></script></body></html>
