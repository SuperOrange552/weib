<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="csrf-token" th:content="${session.csrf_token}">
    <title>帖子详情 - 微招</title>
    <link rel="stylesheet" href="/css/forum.css">
    <link rel="stylesheet" href="/css/app-shell.css">
<script src="/js/app-shell.js"></script></head>
<body>
<main class="forum-page light-surface">
    <nav class="forum-system-nav" aria-label="论坛导航">
        <a class="forum-system-back"
           th:href="${activeRole == 'BOSS' ? '/boss' : '/'}"
           th:text="${activeRole == 'BOSS' ? '← 返回Boss工作台' : '← 返回职位大厅'}">← 返回职位大厅</a>
        <a class="forum-nav-link" href="/forum">← 返回论坛首页</a>
    </nav>
    <div id="post" class="forum-card" style="margin-top:16px"></div>
    <div class="forum-card">
        <h2>评论</h2>
        <div id="comments"></div>
        <form id="commentForm">
            <textarea id="comment" required maxlength="2000" placeholder="写下你的评论"></textarea>
            <button class="forum-btn" type="submit">发表评论</button>
            <div id="message" class="forum-error" role="alert"></div>
        </form>
    </div>
</main>
<script src="/js/forum-detail.js"></script>
</body>
</html>
