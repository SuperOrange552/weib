<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>论坛 - 微招</title>
    <link rel="stylesheet" href="/css/forum.css">
    <link rel="stylesheet" href="/css/app-shell.css">
<script src="/js/app-shell.js"></script></head>
<body>
<main class="forum-page light-surface">
    <nav class="forum-system-nav" aria-label="论坛导航">
        <a class="forum-system-back"
           th:href="${activeRole == 'BOSS' ? '/boss' : '/'}"
           th:text="${activeRole == 'BOSS' ? '← 返回Boss工作台' : '← 返回职位大厅'}">← 返回职位大厅</a>
        <a class="forum-nav-link active" href="/forum">论坛首页</a>
    </nav>
    <div class="forum-toolbar">
        <h1>微招论坛</h1>
        <input id="search" placeholder="搜索帖子、标签">
        <button class="forum-btn" onclick="loadPosts()">搜索</button>
        <a class="forum-btn" href="/forum/post/new">发布帖子</a>
    </div>
    <div id="sections" class="forum-sections"></div>
    <div id="message" class="forum-error" role="alert"></div>
    <div id="posts"></div>
</main>
<script src="/js/forum.js"></script>
</body>
</html>
