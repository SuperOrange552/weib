<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" th:content="${csrf_token}">
    <title th:text="${job.title} + ' - 微招'">职位详情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 30px 20px; }

        /* 返回按钮 */
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px;
            color: #00c2b3; text-decoration: none;
            padding: 10px 20px; border-radius: 8px;
            background: rgba(0,194,179,0.1);
            border: 1px solid rgba(0,194,179,0.3);
            margin-bottom: 24px; transition: all 0.3s;
        }
        .back-btn:hover { background: rgba(0,194,179,0.2); transform: translateX(-5px); }

        /* 职位卡片 */
        .job-detail {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px; padding: 32px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 24px;
        }
        .job-header {
            display: flex; justify-content: space-between;
            align-items: flex-start; margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .job-title-section h1 {
            font-size: 28px; color: #fff; margin-bottom: 12px;
        }
        .salary {
            font-size: 32px; font-weight: bold;
            background: linear-gradient(135deg, #00c2b3, #5dd5c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .job-tags { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
        .tag {
            padding: 6px 16px; border-radius: 20px; font-size: 14px;
            background: rgba(93,213,200,0.2); color: #6adbcf;
            border: 1px solid rgba(93,213,200,0.3);
        }
        .fav-btn-job {
            padding: 12px 24px;
            color: #9fa3af;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.05);
            white-space: nowrap;
        }
        .fav-btn-job:hover { border-color: #ffc107; color: #ffc107; }
        .fav-btn-job.favorited {
            border-color: #ffc107;
            color: #ffc107;
            background: rgba(255,193,7,0.1);
        }
        .apply-btn {
            padding: 16px 40px; color: #fff; border: none;
            border-radius: 12px; font-size: 18px; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
            background: linear-gradient(135deg, #00c2b3, #5dd5c8);
            box-shadow: 0 8px 25px rgba(0,194,179,0.3);
        }
        .apply-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(0,194,179,0.5); }
        .apply-btn:disabled { background: #444; cursor: not-allowed; transform: none; box-shadow: none; }
        .apply-btn.applied { background: linear-gradient(135deg, #10b981, #059669); }

        /* 职位信息 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 32px;
        }
        .info-item { display: flex; align-items: center; gap: 12px; }
        .info-icon {
            width: 44px; height: 44px; border-radius: 10px;
            background: rgba(0,194,179,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .info-label { font-size: 13px; color: #666; margin-bottom: 4px; }
        .info-value { font-size: 15px; color: #e0e0e0; font-weight: 500; }

        /* 描述区域 */
        .section { margin-bottom: 32px; }
        .section-title {
            font-size: 20px; color: #fff; margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(0,194,179,0.3);
            display: flex; align-items: center; gap: 10px;
        }
        .section-content {
            background: rgba(255,255,255,0.03);
            border-radius: 12px; padding: 20px;
            line-height: 1.8; color: #9fa3b0;
            white-space: pre-wrap;
        }

        /* 公司信息 */
        .company-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px; padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; gap: 20px; align-items: center;
        }
        .company-logo {
            width: 72px; height: 72px; border-radius: 16px;
            background: linear-gradient(135deg, #5e96f2, #53cac3);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; color: #fff; flex-shrink: 0;
        }
        .company-info h3 { font-size: 20px; color: #fff; margin-bottom: 8px; }
        .company-meta { display: flex; gap: 20px; color: #888; font-size: 14px; }
        .company-meta span { display: flex; align-items: center; gap: 6px; }

        /* 地图容器 - Boss直聘风格 */
        .map-section { margin-bottom: 32px; }
        .map-wrapper {
            background: #fff;
            border-radius: 16px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #amapContainer { width: 100%; height: 420px; }

        /* 距离信息卡片 */
        .distance-card {
            display: none;
            margin: 0; padding: 14px 20px;
            background: linear-gradient(135deg, rgba(0,194,179,0.08), rgba(93,213,200,0.05));
            border-bottom: 1px solid rgba(255,255,255,0.06);
            align-items: center; gap: 16px;
        }
        .distance-card.show { display: flex; }
        .distance-main {
            display: flex; align-items: baseline; gap: 6px;
        }
        .distance-value {
            font-size: 28px; font-weight: 700;
            background: linear-gradient(135deg, #00c2b3, #5dd5c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .distance-unit { font-size: 14px; color: #888; }
        .distance-detail {
            display: flex; flex-direction: column; gap: 4px;
            font-size: 13px; color: #888;
        }
        .distance-detail .time {
            font-size: 16px; color: #e0e0e0; font-weight: 600;
        }
        .distance-type {
            margin-left: auto; font-size: 12px; color: #666;
            padding: 4px 12px; background: rgba(0,194,179,0.15);
            border-radius: 20px;
        }

        /* 操作按钮 */
        .map-controls {
            display: flex; gap: 10px; padding: 14px 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.02);
            flex-wrap: wrap;
        }
        .map-btn {
            padding: 8px 18px; border-radius: 20px; border: 1px solid rgba(0,194,179,0.4);
            background: rgba(0,194,179,0.1); color: #00c2b3;
            cursor: pointer; font-size: 13px; transition: all 0.3s;
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
            white-space: nowrap;
        }
        .map-btn:hover { background: rgba(0,194,179,0.2); border-color: rgba(0,194,179,0.6); }
        .map-btn.active {
            background: rgba(0,194,179,0.25); border-color: #00c2b3; color: #fff;
        }
        .map-address {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 20px; color: #888; font-size: 13px;
            border-top: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.02);
        }
        .map-pin { font-size: 16px; }

        /* 路线详情面板 */
        .route-panel {
            display: none;
            background: rgba(255,255,255,0.03);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 16px 20px;
            max-height: 200px; overflow-y: auto;
        }
        .route-panel.show { display: block; }
        .route-info { color: #888; font-size: 13px; line-height: 1.8; }
        .route-info strong { color: #00c2b3; }
        .route-info .amap-lib-driving td,
        .route-info .amap-lib-walking td { color: #aaa !important; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 返回按钮 -->
        <a href="/" class="back-btn">← 返回职位大厅</a>

        <div class="job-detail">
            <!-- 职位头部 -->
            <div class="job-header">
                <div class="job-title-section">
                    <h1 th:text="${job.title}">Java高级开发工程师</h1>
                    <div class="salary">
                        <span th:if="${job.salaryMin != null && job.salaryMax != null}">
                            <span th:text="${job.salaryMin}">15</span>k - <span th:text="${job.salaryMax}">25</span>k
                        </span>
                        <span th:if="${job.salaryMin == null || job.salaryMax == null}">薪资面议</span>
                    </div>
                    <div class="job-tags">
                        <span class="tag" th:if="${job.city}" th:text="${job.city}">北京</span>
                        <span class="tag" th:if="${job.education}" th:text="${job.education}">本科</span>
                        <span class="tag" th:if="${job.experience}" th:text="${job.experience}">3-5年</span>
                    </div>
                </div>
                <div style="display:flex;gap:10px;align-items:center;">
                    <button class="fav-btn-job" id="favBtn" th:if="${user != null && user.role == 'seeker'}"
                            th:attr="data-job-id=${encodedJobId}"
                            th:text="${favoriteJobIds.contains(job.id) ? '★ 已收藏' : '☆ 收藏'}"
                            th:classappend="${favoriteJobIds.contains(job.id) ? 'favorited' : ''}">
                        ☆ 收藏
                    </button>
                    <button class="apply-btn" id="applyBtn" th:if="${user != null && user.role == 'seeker'}"
                            th:classappend="${hasApplied ? 'applied' : ''}"
                            th:text="${hasApplied ? '✓ 已投递' : '立即投递'}"
                            th:disabled="${hasApplied}"
                            th:attr="data-job-id=${encodedJobId}">
                        立即投递
                    </button>
                </div>
                <button class="apply-btn" onclick="location.href='/login'" th:if="${user == null}">
                    登录后投递
                </button>
                <button class="apply-btn" disabled style="background:#444;" th:if="${user != null && user.role == 'boss'}">
                    Boss不可投递
                </button>
            </div>

            <!-- 基本信息 -->
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-icon">📍</div>
                    <div>
                        <div class="info-label">工作城市</div>
                        <div class="info-value" th:text="${job.city ?: '未填写'}">北京市</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">🏠</div>
                    <div>
                        <div class="info-label">工作地址</div>
                        <div class="info-value" th:text="${job.address ?: '未填写'}">朝阳区望京SOHO</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">🎗</div>
                    <div>
                        <div class="info-label">学历要求</div>
                        <div class="info-value" th:text="${job.education ?: '不限'}">本科</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">👨</div>
                    <div>
                        <div class="info-label">经验要求</div>
                        <div class="info-value" th:text="${job.experience ?: '不限'}">3-5年</div>
                    </div>
                </div>
            </div>

            <!-- 职位描述 -->
            <div class="section" th:if="${job.description}">
                <div class="section-title">📝 职位描述</div>
                <div class="section-content" th:text="${job.description}">
                    职位描述内容...
                </div>
            </div>

            <!-- 任职要求 -->
            <div class="section" th:if="${job.requirements}">
                <div class="section-title">✅ 任职要求</div>
                <div class="section-content" th:text="${job.requirements}">
                    任职要求内容...
                </div>
            </div>

            <!-- 公司信息 -->
            <div class="section">
                <div class="section-title">🏚 公司信息</div>
                <div class="company-card" th:if="${company != null}">
                    <div class="company-logo" th:text="${company.name.substring(0,1)}">公</div>
                    <div class="company-info">
                        <a th:href="@{/company/{id}(id=${encodedCompanyId})}" style="text-decoration:none;color:inherit;">
                            <h3 th:text="${company.name}">公司名称</h3>
                        </a>
                        <div class="company-meta">
                            <span th:if="${company.industry}">🏮 <span th:text="${company.industry}">互联网</span></span>
                            <span th:if="${company.scale}">👃 <span th:text="${company.scale}">100-499人</span></span>
                        </div>
                        <p th:if="${company.description}" style="margin-top:10px;color:#888;font-size:14px;" th:text="${company.description}">
                            公司简介...
                        </p>
                    </div>
                </div>
            </div>

            <!-- 公司位置地图（Boss直聘风格：详细街道 + 距离显示） -->
            <div class="section map-section" th:if="${company?.longitude != null && company?.latitude != null}">
                <div class="section-title">🗺 公司位置</div>
                <div class="map-wrapper">
                    <div id="amapContainer"></div>
                    <!-- 距离信息卡片 -->
                    <div class="distance-card" id="distanceCard">
                        <div class="distance-main">
                            <span class="distance-value" id="distValue">--</span>
                            <span class="distance-unit" id="distUnit">km</span>
                        </div>
                        <div class="distance-detail">
                            <span class="time" id="distTime">--</span>
                            <span id="distDesc">点击下方导航按钮规划路线</span>
                        </div>
                        <span class="distance-type" id="distType">直线距离</span>
                    </div>
                    <div class="map-controls">
                        <button class="map-btn active" id="btnWalking" onclick="planRoute('walking')">🚶 步行</button>
                        <button class="map-btn" id="btnDriving" onclick="planRoute('driving')">🚗 驾车</button>
                        <button class="map-btn" id="btnTransit" onclick="planRoute('transit')">🚌 公交</button>
                        <button class="map-btn" onclick="locateMe()">📍 我的位置</button>
                        <button class="map-btn" onclick="openInAmap()">🗺 高德地图打开</button>
                    </div>
                    <div class="map-address">
                        <span class="map-pin">📍</span>
                        <span th:text="${company.address ?: '公司地址'}">公司地址</span>
                    </div>
                    <div class="route-panel" id="routePanel">
                        <div class="route-info" id="routeInfo"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:if="${company?.longitude != null && company?.latitude != null}" th:inline="javascript">
        // 高德地图 - Boss直聘风格（详细街道 + 建筑轮廓 + 距离显示）
        var companyLng = /*[[${company.longitude}]]*/ 116.397;
        var companyLat = /*[[${company.latitude}]]*/ 39.908;
        var companyName = /*[[${company.name}]]*/ '公司';
        var companyAddress = /*[[${company.address}]]*/ '';
        var amapKey = /*[[${amapKey}]]*/ '40e3021845971db336775b94da0326da';
        var map, companyMarker, userMarker, geolocation;
        var userPosition = null;
        var currentRouteType = 'driving';
        var currentRouter = null;  // 当前路径规划实例，用于清除旧路线
        var straightLine = null;   // 直线距离虚线

        function loadAmap() {
            var script = document.createElement('script');
            script.src = 'https://webapi.amap.com/maps?v=2.0&key=' + amapKey
                + '&plugin=AMap.Geolocation,AMap.Driving,AMap.Walking,AMap.Transfer,AMap.Scale,AMap.ToolBar,AMap.GeometryUtil,AMap.Buildings';
            script.onload = initMap;
            script.onerror = function() {
                document.getElementById('amapContainer').innerHTML =
                    '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;background:#1a1a2e;">' +
                    '<div style="text-align:center;"><div style="font-size:48px;margin-bottom:16px;">🗺</div>' +
                    '<p>地图加载失败，请检查网络连接</p>' +
                    '<p style="font-size:12px;margin-top:8px;">公司地址：' + companyAddress + '</p></div></div>';
            };
            document.head.appendChild(script);
        }

        function initMap() {
            map = new AMap.Map('amapContainer', {
                center: [companyLng, companyLat],
                zoom: 17,
                // 使用默认样式获得最详细的地图（街道名、建筑轮廓、POI 标注均清晰可见）
                mapStyle: 'amap://styles/light',
                features: ['bg', 'road', 'building', 'point'],
                viewMode: '2D',
                showBuildingBlock: true,
                pitch: 30
            });

            // 添加比例尺控件
            map.addControl(new AMap.Scale({ position: 'LB' }));

            // 添加缩放工具条
            map.addControl(new AMap.ToolBar({
                position: 'RT',
                locate: false,
                liteStyle: false
            }));

            // 启用建筑图层（3D建筑轮廓）
            var buildings = new AMap.Buildings({
                zooms: [14, 20],
                opacity: 0.8,
                heightFactor: 1.5
            });
            map.add(buildings);

            // 公司标记 - Boss直聘风格红色标记
            companyMarker = new AMap.Marker({
                position: [companyLng, companyLat],
                title: companyName,
                icon: new AMap.Icon({
                    size: new AMap.Size(36, 50),
                    image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png',
                    imageSize: new AMap.Size(36, 50),
                    imageOffset: new AMap.Pixel(0, 0)
                }),
                anchor: 'center',
                label: {
                    content: '<div style="background:rgba(0,0,0,0.75);color:#fff;padding:4px 12px;border-radius:4px;font-size:12px;white-space:nowrap;margin-top:8px;">'
                        + companyName + '</div>',
                    direction: 'bottom',
                    offset: new AMap.Pixel(0, 0)
                }
            });
            map.add(companyMarker);

            // 信息窗体
            var infoWindow = new AMap.InfoWindow({
                content: '<div style="padding:8px 12px;font-size:13px;"><strong style="color:#333;">'
                    + companyName + '</strong><br><span style="color:#666;font-size:12px;">'
                    + companyAddress + '</span></div>',
                offset: new AMap.Pixel(0, -50)
            });
            companyMarker.on('click', function() {
                infoWindow.open(map, companyMarker.getPosition());
            });
            infoWindow.open(map, companyMarker.getPosition());

            // 预初始化定位
            AMap.plugin('AMap.Geolocation', function() {
                geolocation = new AMap.Geolocation({
                    enableHighAccuracy: true,
                    timeout: 10000
                });
                // 静默获取用户位置用于距离计算
                geolocation.getCurrentPosition(function(status, result) {
                    if (status === 'complete') {
                        userPosition = [result.position.lng, result.position.lat];
                        showStraightDistance();
                    }
                });
            });
        }

        // 计算并显示直线距离 + 在地图上画虚线
        function showStraightDistance() {
            if (!userPosition) return;
            var dist = AMap.GeometryUtil.distance(userPosition, [companyLng, companyLat]);
            var card = document.getElementById('distanceCard');
            document.getElementById('distValue').textContent = dist < 1000
                ? Math.round(dist) : (dist / 1000).toFixed(1);
            document.getElementById('distUnit').textContent = dist < 1000 ? 'm' : 'km';
            document.getElementById('distTime').textContent = dist < 1000
                ? '步行约' + Math.round(dist / 80) + '分钟'
                : '驾车约' + Math.round(dist / 500) + '分钟';
            document.getElementById('distDesc').textContent = '点击下方导航查看详细路线';
            document.getElementById('distType').textContent = '直线距离';
            card.classList.add('show');

            // 在地图上画虚线连接两点（直线参考线）
            if (straightLine) { map.remove(straightLine); }
            straightLine = new AMap.Polyline({
                path: [userPosition, [companyLng, companyLat]],
                strokeColor: '#00c2b3',
                strokeWeight: 3,
                strokeStyle: 'dashed',
                strokeDasharray: [12, 8],
                lineJoin: 'round',
                zIndex: 50,
                showDir: true
            });
            map.add(straightLine);
            map.setFitView(null, false, [80, 80, 80, 200]);
        }

        function locateMe() {
            if (!map || !geolocation) {
                AMap.plugin('AMap.Geolocation', function() {
                    geolocation = new AMap.Geolocation({
                        enableHighAccuracy: true,
                        timeout: 10000
                    });
                    doLocate();
                });
                return;
            }
            doLocate();
        }

        function doLocate() {
            if (!geolocation) return;
            geolocation.getCurrentPosition(function(status, result) {
                if (status === 'complete') {
                    var pos = [result.position.lng, result.position.lat];
                    userPosition = pos;
                    map.setCenter(pos);
                    if (userMarker) { map.remove(userMarker); }
                    userMarker = new AMap.Marker({
                        position: pos,
                        icon: new AMap.Icon({
                            size: new AMap.Size(24, 36),
                            image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png',
                            imageSize: new AMap.Size(24, 36)
                        }),
                        title: '我的位置',
                        zIndex: 100
                    });
                    map.add(userMarker);
                    map.setFitView(null, false, [80, 80, 80, 200]);
                    showStraightDistance();
                    // 定位成功后自动规划驾车路线
                    planRoute('driving');
                } else {
                    alert('定位失败，请检查浏览器定位权限。您也可以点击上方导航按钮查看公司位置。');
                }
            });
        }

        function planRoute(type) {
            if (!map) return;
            if (!userPosition) {
                // 还未定位，先定位
                if (!geolocation) {
                    AMap.plugin('AMap.Geolocation', function() {
                        geolocation = new AMap.Geolocation({
                            enableHighAccuracy: true,
                            timeout: 10000
                        });
                        geolocation.getCurrentPosition(function(status, result) {
                            if (status === 'complete') {
                                userPosition = [result.position.lng, result.position.lat];
                                if (userMarker) { map.remove(userMarker); }
                                userMarker = new AMap.Marker({
                                    position: userPosition,
                                    icon: new AMap.Icon({
                                        size: new AMap.Size(24, 36),
                                        image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png',
                                        imageSize: new AMap.Size(24, 36)
                                    }),
                                    title: '我的位置',
                                    zIndex: 100
                                });
                                map.add(userMarker);
                                showStraightDistance();
                                doPlanRoute(type);
                            } else {
                                alert('请先点击"我的位置"按钮进行定位');
                            }
                        });
                    });
                    return;
                }
                alert('请先点击"我的位置"按钮进行定位');
                return;
            }

            doPlanRoute(type);
        }

        function doPlanRoute(type) {
            currentRouteType = type;
            var start = userPosition;
            var end = [companyLng, companyLat];

            // 清除之前的路线（路线插件内部已画在地图上的 overlay）
            if (currentRouter) {
                try { currentRouter.clear(); } catch(e) {}
                currentRouter = null;
            }

            // 更新按钮激活状态
            document.querySelectorAll('.map-controls .map-btn').forEach(function(b) { b.classList.remove('active'); });
            var activeBtn = document.getElementById(type === 'walking' ? 'btnWalking' : type === 'transit' ? 'btnTransit' : 'btnDriving');
            if (activeBtn) activeBtn.classList.add('active');

            var panel = document.getElementById('routePanel');
            var info = document.getElementById('routeInfo');
            panel.classList.add('show');
            info.innerHTML = '<div style="color:#00c2b3;text-align:center;padding:20px;">正在规划路线...</div>';

            var typeLabel = type === 'walking' ? '步行' : type === 'transit' ? '公交' : '驾车';
            document.getElementById('distType').textContent = typeLabel + '路线';

            if (type === 'driving') {
                AMap.plugin('AMap.Driving', function() {
                    var driving = new AMap.Driving({
                        map: map,
                        panel: 'routeInfo',
                        showTraffic: false,
                        policy: AMap.DrivingPolicy.LEAST_TIME,
                        autoFitView: true
                    });
                    driving.search(start, end, function(status, result) {
                        panel.classList.add('show');
                        updateDistanceFromRoute(result, 'driving');
                        styleRoutePolylines();
                    });
                    currentRouter = driving;
                });
            } else if (type === 'walking') {
                AMap.plugin('AMap.Walking', function() {
                    var walking = new AMap.Walking({
                        map: map,
                        panel: 'routeInfo',
                        autoFitView: true
                    });
                    walking.search(start, end, function(status, result) {
                        panel.classList.add('show');
                        updateDistanceFromRoute(result, 'walking');
                        styleRoutePolylines();
                    });
                    currentRouter = walking;
                });
            } else if (type === 'transit') {
                AMap.plugin('AMap.Transfer', function() {
                    var transfer = new AMap.Transfer({
                        map: map,
                        panel: 'routeInfo',
                        city: '北京',
                        policy: AMap.TransferPolicy.LEAST_TIME,
                        autoFitView: true
                    });
                    transfer.search(start, end, function(status, result) {
                        panel.classList.add('show');
                        updateDistanceFromRoute(result, 'transit');
                        styleRoutePolylines();
                    });
                    currentRouter = transfer;
                });
            }
        }

        // 遍历地图上所有路线折线，统一风格使其更显眼
        function styleRoutePolylines() {
            try {
                map.getAllOverlays('polyline').forEach(function(poly) {
                    var opts = poly.getOptions();
                    if (opts.strokeStyle !== 'dashed' && opts.strokeWeight < 6) {
                        poly.setOptions({
                            strokeColor: '#00c2b3',
                            strokeWeight: 7,
                            strokeOpacity: 0.9,
                            lineJoin: 'round',
                            showDir: true
                        });
                    }
                });
            } catch(e) {}
        }

        function updateDistanceFromRoute(result, type) {
            if (!result || !result.routes || result.routes.length === 0) return;
            var route = result.routes[0];
            var dist = route.distance; // 米
            var time = route.time; // 秒
            var card = document.getElementById('distanceCard');

            document.getElementById('distValue').textContent = dist < 1000
                ? Math.round(dist) : (dist / 1000).toFixed(1);
            document.getElementById('distUnit').textContent = dist < 1000 ? 'm' : 'km';

            var timeStr;
            if (time < 60) {
                timeStr = '不到1分钟';
            } else if (time < 3600) {
                timeStr = '约' + Math.round(time / 60) + '分钟';
            } else {
                var h = Math.floor(time / 3600);
                var m = Math.round((time % 3600) / 60);
                timeStr = '约' + h + '小时' + (m > 0 ? m + '分钟' : '');
            }
            document.getElementById('distTime').textContent = timeStr;

            var typeLabel = type === 'walking' ? '步行' : type === 'transit' ? '公交' : '驾车';
            document.getElementById('distDesc').textContent = typeLabel + '路线距离';
            document.getElementById('distType').textContent = typeLabel + '路线';
            card.classList.add('show');
        }

        function openInAmap() {
            var url = 'https://uri.amap.com/navigation?to=' + companyLng + ',' + companyLat
                + ',' + encodeURIComponent(companyName) + '&mode=car&callnative=1';
            window.open(url, '_blank');
        }

        // 初始化
        loadAmap();
    </script>

    <script>
    const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content || '';
    // 收藏功能
    document.getElementById('favBtn')?.addEventListener('click', async function() {
        const btn = this;
        const jobId = btn.dataset.jobId;
        try {
            const resp = await fetch('/job/' + jobId + '/favorite', {
                method: 'POST',
                headers: { 'X-CSRF-Token': csrfToken }
            });
            const data = await resp.json();
            if (data.code === 200) {
                if (data.data.favorited) {
                    btn.textContent = '★ 已收藏';
                    btn.classList.add('favorited');
                } else {
                    btn.textContent = '☆ 收藏';
                    btn.classList.remove('favorited');
                }
            }
        } catch(e) {}
    });

    // 投递功能
    document.getElementById('applyBtn')?.addEventListener('click', async function() {
        const btn = this;
        const jobId = btn.dataset.jobId;

        btn.disabled = true;
        btn.textContent = '投递中...';

        try {
            const resp = await fetch('/job/' + jobId + '/apply', {
                method: 'POST',
                headers: { 'X-CSRF-Token': csrfToken }
            });
            const data = await resp.json();

            if (data.code === 200) {
                btn.classList.add('applied');
                btn.textContent = '✓ 已投递';
                alert(data.msg);
            } else {
                btn.disabled = false;
                btn.textContent = '立即投递';
                alert(data.msg);
            }
        } catch (e) {
            btn.disabled = false;
            btn.textContent = '立即投递';
            alert('投递失败，请重试');
        }
    });
    </script>
