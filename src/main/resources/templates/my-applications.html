<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的投递 - 微招</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #00c2b3, #5dd5c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links { display: flex; gap: 12px; flex-wrap: wrap; }
        .nav-links a {
            color: #9fa3af;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
            font-size: 14px;
            position: relative;
        }
        .nav-links a:hover, .nav-links a.active {
            background: rgba(0,194,179,0.2);
            color: #00c2b3;
        }
        .badge {
            position: absolute;
            top: 0;
            right: 2px;
            background: #ef505e;
            color: #fff;
            font-size: 10px;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }
        .logout-btn {
            background: rgba(255,255,255,0.1);
            color: #9fa3af;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .logout-btn:hover { background: rgba(239,80,94,0.2); color: #ef505e; }

        .page-header { margin-bottom: 24px; }
        .page-title { font-size: 24px; color: #fff; }

        /* 统计卡片 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #00c2b3, #5dd5c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label { color: #888; font-size: 13px; margin-top: 6px; }

        .app-list { display: flex; flex-direction: column; gap: 14px; }
        .app-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .app-card:hover { border-color: rgba(0,194,179,0.3); }
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .app-job { font-size: 18px; font-weight: 600; color: #fff; }
        .status-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        .status-pending { background: rgba(255,193,7,0.2); color: #ffc107; }
        .status-viewed { background: rgba(94,150,242,0.2); color: #5e96f2; }
        .status-accepted { background: rgba(16,185,129,0.2); color: #10b981; }
        .status-rejected { background: rgba(239,80,94,0.2); color: #ef505e; }

        .app-meta { display: flex; gap: 20px; color: #888; font-size: 14px; flex-wrap: wrap; }
        .app-actions { margin-top: 14px; display: flex; gap: 10px; }
        .chat-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 20px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(0,194,179,0.2), rgba(93,213,200,0.2));
            color: #00c2b3;
            border: 1px solid rgba(0,194,179,0.4);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }
        .chat-link:hover { background: rgba(0,194,179,0.3); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .empty-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
        .empty-state h3 { font-size: 20px; margin-bottom: 10px; color: #888; }
        .empty-state p { color: #555; margin-bottom: 20px; }
        .empty-state a { color: #00c2b3; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">微招</div>
            <div class="nav-links">
                <a href="/">职位大厅</a>
                <a href="/notifications">
                    通知
                    <span class="badge" th:if="${unreadNotifCount > 0}" th:text="${unreadNotifCount}">0</span>
                </a>
                <a href="/my/applications" class="active">我的投递</a>
                <a href="/my/favorites">收藏</a>
                <a href="/resume">我的简历</a>
                <a href="/chat">
                    消息
                    <span class="badge" th:if="${unreadMsgCount > 0}" th:text="${unreadMsgCount}">0</span>
                </a>
            </div>
            <form id="logoutForm" method="post" action="/logout" style="display:none">
                <input type="hidden" name="_csrf" th:value="${csrf_token}" />
            </form>
            <button class="logout-btn" onclick="document.getElementById('logoutForm').submit()">退出</button>
        </div>

        <div class="page-header">
            <h2 class="page-title">我的投递</h2>
        </div>

        <!-- 统计区域 -->
        <div class="stats-row" th:if="${not #lists.isEmpty(applications)}">
            <div class="stat-card">
                <div class="stat-value" th:text="${#lists.size(applications)}">0</div>
                <div class="stat-label">总共投递</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" th:text="${#lists.isEmpty(applications) ? 0 : applications.?[status == 'pending'].size()}">0</div>
                <div class="stat-label">待查看</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" th:text="${#lists.isEmpty(applications) ? 0 : applications.?[status == 'viewed'].size()}">0</div>
                <div class="stat-label">已查看</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" th:text="${#lists.isEmpty(applications) ? 0 : applications.?[status == 'accepted'].size()}">0</div>
                <div class="stat-label">已通过</div>
            </div>
        </div>

        <div class="app-list" th:if="${not #lists.isEmpty(applications)}">
            <div class="app-card" th:each="app : ${applications}">
                <div class="app-header">
                    <div class="app-job" th:text="${app.jobTitle ?: '职位已删除'}">职位名称</div>
                    <span class="status-badge"
                          th:classappend="${'pending' == app.status ? 'status-pending' :
                                          ('viewed' == app.status ? 'status-viewed' :
                                          ('accepted' == app.status ? 'status-accepted' : 'status-rejected'))}"
                          th:text="${'pending' == app.status ? '待查看' :
                                   ('viewed' == app.status ? '已查看' :
                                   ('accepted' == app.status ? '已通过' : '已拒绝'))}">
                        待查看
                    </span>
                </div>
                <div class="app-meta">
                    <span>投递时间: <span th:text="${#temporals.format(app.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</span></span>
                    <span>更新时间: <span th:text="${#temporals.format(app.updatedAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</span></span>
                </div>
                <div th:if="${app.bossNote}" style="margin-top:12px;padding:12px 16px;background:rgba(0,194,179,0.06);border-radius:10px;border-left:3px solid rgba(0,194,179,0.3);">
                    <div style="color:#888;font-size:12px;margin-bottom:4px;">Boss留言</div>
                    <div style="color:#b0b0b0;font-size:14px;line-height:1.6;" th:text="${app.bossNote}">备注</div>
                </div>
                <div class="app-actions">
                    <a th:href="@{/chat/{id}(id=${encodedApplicationIds[app.id]})}" class="chat-link">联系Boss</a>
                </div>
            </div>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(applications)}">
            <div class="empty-icon">📋</div>
            <h3>暂无投递记录</h3>
            <p>快去职位大厅看看有没有心仪的职位吧</p>
            <a href="/">浏览职位大厅</a>
        </div>
    </div>
<script src="/js/submit-guard.js"></script>
</body>
</html>
