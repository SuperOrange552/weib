<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - 微招</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 30px 20px; }

        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(135deg, #00c2b3, #5dd5c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links { display: flex; gap: 12px; flex-wrap: wrap; }
        .nav-links a {
            color: #9fa3af;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
            font-size: 14px;
            position: relative;
        }
        .nav-links a:hover, .nav-links a.active {
            background: rgba(0,194,179,0.2);
            color: #00c2b3;
        }
        .badge {
            position: absolute;
            top: 0;
            right: 2px;
            background: #ef505e;
            color: #fff;
            font-size: 10px;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }
        .logout-btn {
            background: rgba(255,255,255,0.1);
            color: #9fa3af;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .logout-btn:hover { background: rgba(239,80,94,0.2); color: #ef505e; }

        .page-title { font-size: 22px; color: #fff; margin-bottom: 24px; }

        .job-list { display: flex; flex-direction: column; gap: 14px; }
        .job-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 22px 28px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
        }
        .job-card:hover {
            border-color: rgba(0,194,179,0.3);
            transform: translateX(5px);
        }
        .job-info { flex: 1; }
        .job-title { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; }
        .job-company { color: #00c2b3; font-size: 14px; margin-bottom: 6px; }
        .job-meta { display: flex; gap: 16px; color: #888; font-size: 13px; flex-wrap: wrap; }
        .job-tag {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            background: rgba(93,142,233,0.15);
            color: #5d8ee9;
            border: 1px solid rgba(93,142,233,0.25);
        }
        .job-tag.city { background: rgba(16,185,129,0.1); color: #10b981; border-color: rgba(16,185,129,0.2); }

        .job-right { text-align: right; flex-shrink: 0; }
        .job-salary {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #00c2b3, #5dd5c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .unfav-btn {
            background: none;
            border: 1px solid rgba(239,80,94,0.3);
            color: #ef505e;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .unfav-btn:hover { background: rgba(239,80,94,0.15); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
        .empty-state h3 { color: #888; margin-bottom: 8px; }
        .empty-state p { color: #555; font-size: 14px; margin-bottom: 20px; }
        .empty-state a { color: #00c2b3; text-decoration: none; }
    </style>
<link rel="stylesheet" href="/css/app-shell.css"></head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">微招</div>
            <div class="nav-links">
                <a href="/">职位大厅</a>
                <a href="/notifications">
                    通知
                    <span class="badge" th:if="${unreadNotifCount > 0}" th:text="${unreadNotifCount}">0</span>
                </a>
                <a href="/my/applications">我的投递</a>
                <a href="/my/favorites" class="active">收藏</a>
                <a href="/resume">我的简历</a>
                <a href="/chat">
                    消息
                    <span class="badge" th:if="${unreadMsgCount > 0}" th:text="${unreadMsgCount}">0</span>
                </a>
            </div>
            <form id="logoutForm" method="post" action="/logout" style="display:none">
                <input type="hidden" name="_csrf" th:value="${csrf_token}" />
            </form>
            <button class="logout-btn" onclick="document.getElementById('logoutForm').submit()">退出</button>
        </div>

        <h2 class="page-title">收藏职位</h2>

        <div class="job-list" th:if="${not #lists.isEmpty(jobs)}">
            <a th:href="@{/job/{id}(id=${encodedJobIds[job.id]})}" class="job-card" th:each="job : ${jobs}">
                <div class="job-info">
                    <div class="job-title" th:text="${job.title}">职位名称</div>
                    <div class="job-company" th:text="${companyMap[job.companyId]?.name ?: '公司'}">公司名</div>
                    <div class="job-meta">
                        <span class="job-tag city" th:if="${job.city}" th:text="${job.city}">城市</span>
                        <span class="job-tag" th:if="${job.education}" th:text="${job.education}">学历</span>
                        <span class="job-tag" th:if="${job.experience}" th:text="${job.experience}">经验</span>
                    </div>
                </div>
                <div class="job-right" onclick="event.preventDefault(); event.stopPropagation();">
                    <div class="job-salary" th:if="${job.salaryMin != null && job.salaryMax != null}">
                        <span th:text="${job.salaryMin}">15</span>k-<span th:text="${job.salaryMax}">25</span>k
                    </div>
                    <button class="unfav-btn" th:attr="data-job-id=${encodedJobIds[job.id]}" onclick="toggleFav(this)">取消收藏</button>
                </div>
            </a>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(jobs)}">
            <div class="empty-icon">⭐</div>
            <h3>暂无收藏职位</h3>
            <p>浏览职位时点击星标即可收藏</p>
            <a href="/">浏览职位大厅</a>
        </div>
    </div>

    <script>
    async function toggleFav(btn) {
        const jobId = btn.dataset.jobId;
        const card = btn.closest('.job-card');
        try {
            const resp = await fetch('/job/' + jobId + '/favorite', { method: 'POST' });
            const data = await resp.json();
            if (data.code === 200 && !data.data.favorited) {
                card.style.opacity = '0';
                setTimeout(() => card.remove(), 300);
                if (document.querySelectorAll('.job-card').length === 1) {
                    location.reload();
                }
            }
        } catch(e) {}
    }
    </script>
<script src="/js/submit-guard.js"></script>
</body>
</html>
