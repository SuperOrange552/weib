<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历预览 - 微招</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }

        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #00c2b3, #5dd5c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links { display: flex; gap: 12px; flex-wrap: wrap; }
        .nav-links a {
            color: #9fa3af;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
            font-size: 14px;
            position: relative;
        }
        .nav-links a:hover, .nav-links a.active {
            background: rgba(0,194,179,0.2);
            color: #00c2b3;
        }
        .badge {
            position: absolute;
            top: 0;
            right: 2px;
            background: #ef505e;
            color: #fff;
            font-size: 10px;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }
        .logout-btn {
            background: rgba(255,255,255,0.1);
            color: #9fa3af;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .logout-btn:hover { background: rgba(239,80,94,0.2); color: #ef505e; }

        .resume-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        /* 头部 */
        .resume-header {
            background: linear-gradient(135deg, #5e96f2, #53cac3);
            padding: 40px;
            color: #fff;
        }
        .resume-header h1 { font-size: 28px; margin-bottom: 10px; }
        .resume-header p { font-size: 14px; opacity: 0.8; }

        /* 内容 */
        .resume-body { padding: 40px; color: #333; }

        .section { margin-bottom: 30px; }
        .section-title {
            font-size: 18px;
            color: #5e96f2;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #5e96f2;
        }

        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .info-item { }
        .info-label { font-size: 13px; color: #888; margin-bottom: 4px; }
        .info-value { font-size: 15px; color: #333; }

        .content-text {
            white-space: pre-wrap;
            line-height: 1.8;
            color: #555;
        }

        /* 打印按钮 */
        .print-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #5e96f2, #53cac3);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            box-shadow: 0 8px 25px rgba(94,150,242,0.4);
            transition: all 0.3s;
        }
        .print-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(94,150,242,0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">微招</div>
            <div class="nav-links">
                <a href="/">职位大厅</a>
                <a href="/notifications">
                    通知
                    <span class="badge" th:if="${unreadNotifCount > 0}" th:text="${unreadNotifCount}">0</span>
                </a>
                <a href="/my/applications">我的投递</a>
                <a href="/my/favorites">收藏</a>
                <a href="/resume" class="active">我的简历</a>
                <a href="/chat">
                    消息
                    <span class="badge" th:if="${unreadMsgCount > 0}" th:text="${unreadMsgCount}">0</span>
                </a>
            </div>
            <form id="logoutForm" method="post" action="/logout" style="display:none">
                <input type="hidden" name="_csrf" th:value="${csrf_token}" />
            </form>
            <button class="logout-btn" onclick="document.getElementById('logoutForm').submit()">退出</button>
        </div>

        <a href="/resume" style="display:inline-flex;align-items:center;gap:8px;color:#00c2b3;text-decoration:none;padding:10px 20px;border-radius:8px;background:rgba(0,194,179,0.1);border:1px solid rgba(0,194,179,0.3);margin-bottom:30px;transition:all 0.3s;">← 返回编辑</a>

        <div class="resume-card">
            <div class="resume-header">
                <h1 th:text="${resume.realName ?: '未填写'}">张三</h1>
                <p>简历预览</p>
            </div>

            <div class="resume-body">
                <!-- 基本信息 -->
                <div class="section">
                    <div class="section-title">👤 基本信息</div>
                    <div class="info-grid">
                        <div class="info-item" th:if="${resume.gender}">
                            <div class="info-label">性别</div>
                            <div class="info-value" th:text="${resume.gender}">男</div>
                        </div>
                        <div class="info-item" th:if="${resume.birthday}">
                            <div class="info-label">出生年月</div>
                            <div class="info-value" th:text="${resume.birthday}">1995-01</div>
                        </div>
                        <div class="info-item" th:if="${resume.phone}">
                            <div class="info-label">手机号</div>
                            <div class="info-value" th:text="${resume.phone}">13800138000</div>
                        </div>
                        <div class="info-item" th:if="${resume.email}">
                            <div class="info-label">邮箱</div>
                            <div class="info-value" th:text="${resume.email}">zhangsan@email.com</div>
                        </div>
                    </div>
                </div>

                <!-- 教育经历 -->
                <div class="section" th:if="${resume.education != null or resume.school != null or resume.major != null}">
                    <div class="section-title">🎓 教育经历</div>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">学历</div>
                            <div class="info-value" th:text="${resume.education ?: '-'}">本科</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">毕业院校</div>
                            <div class="info-value" th:text="${resume.school ?: '-'}">某某大学</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">专业</div>
                            <div class="info-value" th:text="${resume.major ?: '-'}">计算机科学与技术</div>
                        </div>
                    </div>
                </div>

                <!-- 工作经历 -->
                <div class="section" th:if="${resume.workExperience}">
                    <div class="section-title">💼 工作经历</div>
                    <div class="content-text" th:text="${resume.workExperience}">
                        工作经历内容...
                    </div>
                </div>

                <!-- 项目经历 -->
                <div class="section" th:if="${resume.projectExperience}">
                    <div class="section-title">🚀 项目经历</div>
                    <div class="content-text" th:text="${resume.projectExperience}">
                        项目经历内容...
                    </div>
                </div>

                <!-- 技能特长 -->
                <div class="section" th:if="${resume.skills}">
                    <div class="section-title">⚡ 技能特长</div>
                    <div class="content-text" th:text="${resume.skills}">
                        技能特长...
                    </div>
                </div>

                <!-- 自我评价 -->
                <div class="section" th:if="${resume.selfIntroduction}">
                    <div class="section-title">💬 自我评价</div>
                    <div class="content-text" th:text="${resume.selfIntroduction}">
                        自我评价内容...
                    </div>
                </div>
            </div>
        </div>

        <button class="print-btn" onclick="window.print()">🖨 打印简历</button>
    </div>
</body>
</html>
