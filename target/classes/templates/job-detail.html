<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${job.title} + ' - 微招'">职位详情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 30px 20px; }
        
        /* 返回按钮 */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #00d4ff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            background: rgba(0,212,255,0.1);
            border: 1px solid rgba(0,212,255,0.3);
            margin-bottom: 24px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: rgba(0,212,255,0.2);
            transform: translateX(-5px);
        }
        
        /* 职位卡片 */
        .job-detail {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 32px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 24px;
        }
        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .job-title-section h1 {
            font-size: 28px;
            color: #fff;
            margin-bottom: 12px;
        }
        .salary {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .job-tags { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
        .tag {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            background: rgba(139,92,246,0.2);
            color: #a78bfa;
            border: 1px solid rgba(139,92,246,0.3);
        }
        .apply-btn {
            padding: 16px 40px;
            background: linear-gradient(135deg, #00d4ff, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(0,212,255,0.3);
        }
        .apply-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0,212,255,0.5);
        }
        .apply-btn:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .apply-btn.applied {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        
        /* 职位信息 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .info-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: rgba(0,212,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .info-label { font-size: 13px; color: #666; margin-bottom: 4px; }
        .info-value { font-size: 15px; color: #e0e0e0; font-weight: 500; }
        
        /* 描述区域 */
        .section {
            margin-bottom: 32px;
        }
        .section-title {
            font-size: 20px;
            color: #fff;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(0,212,255,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-content {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 20px;
            line-height: 1.8;
            color: #b0b0b0;
            white-space: pre-wrap;
        }
        
        /* 公司信息 */
        .company-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .company-logo {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #fff;
            flex-shrink: 0;
        }
        .company-info h3 { font-size: 20px; color: #fff; margin-bottom: 8px; }
        .company-meta { display: flex; gap: 20px; color: #888; font-size: 14px; }
        .company-meta span { display: flex; align-items: center; gap: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 返回按钮 -->
        <a href="/" class="back-btn">← 返回职位大厅</a>
        
        <div class="job-detail">
            <!-- 职位头部 -->
            <div class="job-header">
                <div class="job-title-section">
                    <h1 th:text="${job.title}">Java高级开发工程师</h1>
                    <div class="salary">
                        <span th:if="${job.salaryMin != null && job.salaryMax != null}">
                            <span th:text="${job.salaryMin/1000}">15</span>k - <span th:text="${job.salaryMax/1000}">25</span>k
                        </span>
                        <span th:if="${job.salaryMin == null || job.salaryMax == null}">薪资面议</span>
                    </div>
                    <div class="job-tags">
                        <span class="tag" th:if="${job.city}" th:text="${job.city}">北京</span>
                        <span class="tag" th:if="${job.education}" th:text="${job.education}">本科</span>
                        <span class="tag" th:if="${job.experience}" th:text="${job.experience}">3-5年</span>
                    </div>
                </div>
                <button class="apply-btn" id="applyBtn" th:if="${user != null && user.role == 'seeker'}"
                        th:classappend="${hasApplied ? 'applied' : ''}"
                        th:text="${hasApplied ? '✓ 已投递' : '立即投递'}"
                        th:disabled="${hasApplied}"
                        th:attr="data-job-id=${job.id}">
                    立即投递
                </button>
                <button class="apply-btn" onclick="location.href='/login'" th:if="${user == null}">
                    登录后投递
                </button>
                <button class="apply-btn" disabled style="background:#444;" th:if="${user != null && user.role == 'boss'}">
                    Boss不可投递
                </button>
            </div>
            
            <!-- 基本信息 -->
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-icon">📍</div>
                    <div>
                        <div class="info-label">工作城市</div>
                        <div class="info-value" th:text="${job.city ?: '未填写'}">北京市</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">🏠</div>
                    <div>
                        <div class="info-label">工作地址</div>
                        <div class="info-value" th:text="${job.address ?: '未填写'}">朝阳区望京SOHO</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">🎓</div>
                    <div>
                        <div class="info-label">学历要求</div>
                        <div class="info-value" th:text="${job.education ?: '不限'}">本科</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">💼</div>
                    <div>
                        <div class="info-label">经验要求</div>
                        <div class="info-value" th:text="${job.experience ?: '不限'}">3-5年</div>
                    </div>
                </div>
            </div>
            
            <!-- 职位描述 -->
            <div class="section" th:if="${job.description}">
                <div class="section-title">📝 职位描述</div>
                <div class="section-content" th:text="${job.description}">
                    职位描述内容...
                </div>
            </div>
            
            <!-- 任职要求 -->
            <div class="section" th:if="${job.requirements}">
                <div class="section-title">✅ 任职要求</div>
                <div class="section-content" th:text="${job.requirements}">
                    任职要求内容...
                </div>
            </div>
            
            <!-- 公司信息 -->
            <div class="section">
                <div class="section-title">🏢 公司信息</div>
                <div class="company-card" th:if="${company != null}">
                    <div class="company-logo" th:text="${company.name.substring(0,1)}">公</div>
                    <div class="company-info">
                        <h3 th:text="${company.name}">公司名称</h3>
                        <div class="company-meta">
                            <span th:if="${company.industry}">🏭 <span th:text="${company.industry}">互联网</span></span>
                            <span th:if="${company.scale}">👥 <span th:text="${company.scale}">100-499人</span></span>
                        </div>
                        <p th:if="${company.description}" style="margin-top:10px;color:#888;font-size:14px;" th:text="${company.description}">
                            公司简介...
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
    // 投递功能
    document.getElementById('applyBtn')?.addEventListener('click', async function() {
        const btn = this;
        const jobId = btn.dataset.jobId;
        
        btn.disabled = true;
        btn.textContent = '投递中...';
        
        try {
            const resp = await fetch(`/job/${jobId}/apply`, {
                method: 'POST'
            });
            const data = await resp.json();
            
            if (data.code === 200) {
                btn.classList.add('applied');
                btn.textContent = '✓ 已投递';
                alert(data.msg);
            } else {
                btn.disabled = false;
                btn.textContent = '立即投递';
                alert(data.msg);
            }
        } catch (e) {
            btn.disabled = false;
            btn.textContent = '立即投递';
            alert('投递失败，请重试');
        }
    });
    </script>
</body>
</html>
