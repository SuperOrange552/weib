<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的投递 - 微招</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo { 
            font-size: 24px; 
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links { display: flex; gap: 16px; }
        .nav-links a {
            color: #a0a0a0;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
            font-size: 14px;
        }
        .nav-links a:hover, .nav-links a.active {
            background: rgba(0,212,255,0.2);
            color: #00d4ff;
        }
        .logout-btn {
            background: rgba(255,255,255,0.1);
            color: #a0a0a0;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .logout-btn:hover { background: rgba(255,100,100,0.2); color: #ff6b6b; }
        
        .page-header { margin-bottom: 24px; }
        .page-title { font-size: 24px; }
        
        /* 投递列表 */
        .app-list { display: flex; flex-direction: column; gap: 16px; }
        .app-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .app-card:hover { border-color: rgba(0,212,255,0.3); }
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .app-job { font-size: 18px; font-weight: 600; color: #fff; }
        .status-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        .status-pending { background: rgba(255,193,7,0.2); color: #ffc107; }
        .status-viewed { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .status-accepted { background: rgba(16,185,129,0.2); color: #10b981; }
        .status-rejected { background: rgba(255,107,107,0.2); color: #ff6b6b; }
        
        .app-meta { display: flex; gap: 20px; color: #888; font-size: 14px; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .empty-state .icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
        .empty-state h3 { font-size: 20px; margin-bottom: 10px; color: #888; }
        .empty-state p { color: #555; margin-bottom: 20px; }
        .empty-state a {
            color: #00d4ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">⚡ 微招</div>
            <div class="nav-links">
                <a href="/">职位大厅</a>
                <a href="/my/applications" class="active">我的投递</a>
                <a href="/resume">我的简历</a>
            </div>
            <button class="logout-btn" onclick="location.href='/logout'">退出</button>
        </div>
        
        <div class="page-header">
            <h2 class="page-title">📋 我的投递</h2>
        </div>
        
        <div class="app-list" th:if="${not #lists.isEmpty(applications)}">
            <div class="app-card" th:each="app : ${applications}">
                <div class="app-header">
                    <div class="app-job" th:text="${app.jobTitle ?: '职位已删除'}">职位名称</div>
                    <span class="status-badge" 
                          th:classappend="${'pending' == app.status} ? 'status-pending' : 
                                          (${'viewed' == app.status} ? 'status-viewed' : 
                                          (${'accepted' == app.status} ? 'status-accepted' : 'status-rejected'))"
                          th:text="${'pending' == app.status} ? '待处理' : 
                                   (${'viewed' == app.status} ? 'HR已查看' : 
                                   (${'accepted' == app.status} ? '已接收' : '已婉拒'))">
                        待处理
                    </span>
                </div>
                <div class="app-meta">
                    <span>📄 简历ID: <span th:text="${app.resumeId}">1</span></span>
                    <span>🕐 投递时间: <span th:text="${#temporals.format(app.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</span></span>
                </div>
            </div>
        </div>
        
        <div class="empty-state" th:if="${#lists.isEmpty(applications)}">
            <div class="icon">📋</div>
            <h3>暂无投递记录</h3>
            <p>还没有投递任何职位，快去寻找合适的工作吧</p>
            <a href="/">→ 去浏览职位</a>
        </div>
    </div>
</body>
</html>
